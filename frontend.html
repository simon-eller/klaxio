    <main class="p-3" style="height:calc(100vh - 155px)">
        <div class="d-flex gap-3 h-100">

            <!-- Player 1 -->
            <div class="player-panel card border flex-grow-1 rounded-4" id="panel-0">
                <div class="rounded-4"></div>
                <div class="card-body d-flex flex-column align-items-center justify-content-center gap-3">
                    <h2 class="fw-bold fs-2 text-center" id="name-0">Player 1</h2>
                    <div class="display-1 fw-bold score-badge" id="score-0">0</div>
                    <div class="fs-1 text-center" id="icon-0"></div>
                </div>
            </div>

            <!-- Centre column -->
            <div class="d-flex flex-column align-items-center justify-content-center" style="width:80px; flex-shrink:0">
                <div class="flex-grow-1 border-start"></div>
                <div id="phase-label" class="text-secondary small fw-semibold my-2">READY</div>
                <div class="flex-grow-1 border-start"></div>
            </div>

            <!-- Player 2 -->
            <div class="player-panel card border flex-grow-1 rounded-4 position-relative" id="panel-1">
                <div class="rounded-4"></div>
                <div class="card-body d-flex flex-column align-items-center justify-content-center gap-3">
                    <h2 class="fw-bold fs-2 text-center" id="name-1">Player 2</h2>
                    <div class="display-1 fw-bold score-badge" id="score-1">0</div>

                </div>
            </div>

        </div>
    </main>

    <footer class="bg-body-tertiary py-4 px-4 fixed-bottom">
        <div class="d-flex align-items-center justify-content-center gap-2 flex-wrap">
            <button id="btn-arm" class="btn btn-warning fw-semibold icon-link" onclick="send('arm')">
                <span class="material-symbols-rounded">play_arrow</span>
                UNLOCK BUZZERS
            </button>

            <button id="btn-correct" class="btn btn-success fw-semibold icon-link" onclick="send('correct')" disabled>
                <span class="material-symbols-rounded">thumb_up</span>
                Correct
            </button>

            <button id="btn-wrong" class="btn btn-danger fw-semibold icon-link" onclick="send('wrong')" disabled>
                <span class="material-symbols-rounded">thumb_down</span>
                Wrong
            </button>

            <button id="btn-reset" class="btn btn-secondary fw-semibold icon-link" onclick="send('reset')" disabled>
                <span class="material-symbols-rounded">refresh</span>
                New Question
            </button>

            <button id="btn-scores" class="btn btn-outline-secondary fw-semibold icon-link" onclick="resetScores()">
                <span class="material-symbols-rounded">restart_alt</span>
                Reset Scores
            </button>
        </div>
    </footer>

    <div id="toast" class="badge bg-black rounded-pill px-4 py-2 fs-6 fw-normal"></div>

    <script>
      // i18n
      let S = {};
      let currentLang = "en";

      function applyStrings(strings) {
          S = strings;
          document.getElementById("btn-arm").innerHTML = `<span class="material-symbols-rounded">play_arrow</span> ${S.btnArm ?? "UNLOCK BUZZERS"}`;
          document.getElementById("btn-correct").innerHTML = `<span class="material-symbols-rounded">thumb_up</span> ${S.btnCorrect ?? "Correct"}`;
          document.getElementById("btn-wrong").innerHTML = `<span class="material-symbols-rounded">thumb_down</span> ${S.btnWrong ?? "Wrong"}`;
          document.getElementById("btn-reset").innerHTML = `<span class="material-symbols-rounded">refresh</span> ${S.btnReset ?? "New Question"}`;
          document.getElementById("btn-scores").innerHTML = `<span class="material-symbols-rounded">restart_alt</span> ${S.btnResetScores ?? "Reset Scores"}`;
          document.getElementById("conn-text").textContent = connected
          ? (S.connConnected ?? "Connected") : (S.connConnecting ?? "Connecting...");
          applyPhaseLabel(currentPhase);
      }

      function setLang(lang) {
          currentLang = lang;
          document.getElementById("lang-label").textContent = lang === "de" ? "DE" : "EN";
          send("lang_" + currentLang);
      }

      // WebSocket
      const WS_URL = "ws://localhost:8765";
      let ws = null, connected = false, reconnectTimer = null;

      function connect() {
          ws = new WebSocket(WS_URL);
          ws.onopen = () => {
            connected = true;
            const dot = document.getElementById("conn-dot");
            dot.classList.replace("bg-danger", "bg-success");
            dot.classList.add("ok");
            document.getElementById("conn-text").textContent = S.connConnected ?? "Connected";
            toast(S.toastConnected ?? "Server connected ✓");
            clearTimeout(reconnectTimer);
          };
          ws.onclose = () => {
            connected = false;
            const dot = document.getElementById("conn-dot");
            dot.classList.replace("bg-success", "bg-danger");
            dot.classList.remove("ok");
            document.getElementById("conn-text").textContent = S.connReconnecting ?? "Disconnected - reconnecting...";
            reconnectTimer = setTimeout(connect, 2000);
          };

          ws.onerror = () => ws.close();
          ws.onmessage = ({ data }) => {
            try { handleEvent(JSON.parse(data)); } catch(e) { console.error("WS parse error", e); }
          };
      }

      function send(cmd) {
          if (ws && ws.readyState === WebSocket.OPEN)
          ws.send(JSON.stringify({ cmd }));
      }

      // State machine
      let currentPhase = "waiting", currentWinner = null;

      function handleEvent(msg) {
        if (msg.strings) applyStrings(msg.strings);
        if (msg.names) {
          document.getElementById("name-0").textContent = msg.names[0];
          document.getElementById("name-1").textContent = msg.names[1];
        }
          switch (msg.event) {
            case "init":
                document.getElementById("name-0").textContent = msg.names[0];
                document.getElementById("name-1").textContent = msg.names[1];
                updateScores(msg.scores);
                applyPhase(msg.phase, null);
                break;
            case "armed": applyPhase("armed",   null); break;
            case "buzzed":
              applyPhase("buzzed",  msg.winner);
              toast((S.toastBuzzed ?? "{0} buzzed first!").replace("{0}", msg.name));
              break;
            case "correct":
              applyPhase("correct", msg.winner);
              updateScores(msg.scores, msg.winner);
              break;
            case "wrong":
              applyPhase("wrong",   msg.winner);
              break;
            case "reset":
              applyPhase("waiting", null);
              break;
            case "reset_scores":
              updateScores(msg.scores);
              applyPhase("waiting", null);
              break;
          }
      }

      function applyPhase(phase, winner) {
          currentPhase = phase; currentWinner = winner;
          [0, 1].forEach(i => {
            document.getElementById(`panel-${i}`).classList.remove("winner","loser","correct","wrong");
            document.getElementById(`icon-${i}`).innerHTML = phaseIcon(phase, i, winner);
          });

          if (winner !== null) {
            const stateClass = phase === "buzzed" ? "winner" : phase === "correct" ? "correct" : phase === "wrong" ? "wrong" : "";
            if (stateClass) document.getElementById(`panel-${winner}`).classList.add(stateClass);
            document.getElementById(`panel-${1-winner}`).classList.add("loser");
          }

          applyPhaseLabel(phase);
          document.getElementById("btn-arm").disabled = phase === "armed" || phase === "buzzed";
          document.getElementById("btn-correct").disabled = phase !== "buzzed";
          document.getElementById("btn-wrong").disabled = phase !== "buzzed";
          document.getElementById("btn-reset").disabled = phase === "waiting" || phase === "armed";
      }

      function applyPhaseLabel(phase) {
          const el = document.getElementById("phase-label");
          el.className = `text-secondary small fw-semibold my-2 ${phase}`;
          const map = {
            waiting: S.phaseReady   ?? "READY",
            armed:   S.phaseArmed   ?? "BUZZ!",
            buzzed:  S.phaseBuzzed  ?? "BUZZED",
            correct: S.phaseCorrect ?? "CORRECT",
            wrong:   S.phaseWrong   ?? "WRONG",
          };
          el.textContent = map[phase] ?? phase.toUpperCase();
      }

      function phaseIcon(phase, idx, winner) {
          const icon = name => `<span class="material-symbols-rounded fs-1">${name}</span>`;

          if (phase === "armed") return icon("my_location");
          if (phase === "buzzed"  && idx === winner) return icon("notifications_active");
          if (phase === "correct" && idx === winner) return icon("check_circle");
          if (phase === "wrong"   && idx === winner) return icon("cancel");
          if (["buzzed","correct","wrong"].includes(phase) && idx !== winner) return icon("hourglass_empty");
          return icon("radio_button_unchecked");
      }

      function updateScores(scores, bumped = null) {
          [0, 1].forEach(i => {
            const el = document.getElementById(`score-${i}`);
            el.textContent = scores[i];

            if (i === bumped) {
                el.classList.remove("bump");
                void el.offsetWidth;
                el.classList.add("bump");
            }
          });
      }

      function resetScores() {
        if (confirm(S.confirmReset ?? "Really reset scores?")) send("reset_scores");
      }

      // Keyboard shortcuts
      document.addEventListener("keydown", e => {
          if (e.target.tagName === "INPUT") return;

          if (e.code === "Space" || e.code === "Enter") {
            e.preventDefault();
            if (currentPhase === "waiting") send("arm");
            else if (currentPhase !== "armed") send("reset");
          }

          if (e.key === "+" || e.key === "1") send("correct");
          if (e.key === "-" || e.key === "0") send("wrong");
          if (e.key === "r" || e.key === "R") send("reset");
      });

      // Toast
      let toastTimer = null;
      function toast(msg) {
          const el = document.getElementById("toast");
          el.textContent = msg;
          el.classList.add("show");
          clearTimeout(toastTimer);
          toastTimer = setTimeout(() => el.classList.remove("show"), 2500);
      }

      connect();
    </script>
