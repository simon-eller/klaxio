name: ci

on:
  push:
    tags:
      # https://semver.org/#spec-item-2
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Publish (win-x86, self-contained, single file)
        shell: pwsh
        run: |
          dotnet publish .\klaxio.csproj `
            -c Release `
            -r win-x86 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            -o .\out

      - name: Rename EXE for Release
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $exe = Get-ChildItem -Path .\out -Filter *.exe | Select-Object -First 1
          if (-not $exe) { throw "No .exe found in out/" }
          $target = Join-Path $exe.DirectoryName "klaxio-win-x86-$tag.exe"
          Move-Item -Force $exe.FullName $target
          "ASSET_PATH=$target" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Create GitHub Release + upload EXE
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET_PATH }}
